name: geo-microarray-processing

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # R base
  - r-base >=4.3,<4.4
  - r-essentials

  # Bioconductor — data access
  - bioconductor-geoquery
  - bioconductor-biobase

  # Bioconductor — raw data processing
  - bioconductor-affy
  - bioconductor-limma
  - bioconductor-illuminaio

  # Bioconductor — Affymetrix CDF packages (pre-installed to avoid source build)
  - bioconductor-hgu133plus2cdf
  - bioconductor-hgu133acdf
  - bioconductor-hgu133a2cdf

  # CRAN — data manipulation
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-tibble

  # YAML parsing (SKILL.md validation)
  - r-yaml

  # Development & testing
  - r-testthat
  - r-lintr

  # AnnoProbe is CRAN-only (not on conda). Its dependency ggpubr IS on conda.
  # After env creation, install AnnoProbe from CRAN:
  #   Rscript -e 'install.packages("AnnoProbe", repos="https://cloud.r-project.org")'
  # Required for Tier 4 gene annotation on GB_ACC-only platforms (GPL16686, etc.)

  # AnnoProbe dependency (pre-installed so AnnoProbe CRAN install succeeds)
  - r-ggpubr
