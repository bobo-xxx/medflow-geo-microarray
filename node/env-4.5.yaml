name: geo-microarray-processing-4.5

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # R base
  - r-base >=4.5,<4.6
  - r-essentials

  # Bioconductor — data access
  - bioconductor-geoquery
  - bioconductor-biobase

  # Bioconductor — raw data processing
  - bioconductor-affy
  - bioconductor-limma

  # Bioconductor — Affymetrix CDF packages (pre-installed to avoid source build)
  - bioconductor-hgu133plus2cdf
  - bioconductor-hgu133acdf
  - bioconductor-hgu133a2cdf

  # CRAN — data manipulation
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-tibble

  # AnnoProbe dependencies (pre-installed so CRAN install succeeds)
  - r-ggpubr
  - r-dt
  - r-pheatmap

  # YAML parsing (SKILL.md validation)
  - r-yaml

  # Development & testing
  - r-testthat
  - r-lintr
