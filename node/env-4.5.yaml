name: geo-microarray-processing-4.5

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # R base
  - r-base >=4.5,<4.6
  - r-essentials

  # Bioconductor — data access
  - bioconductor-geoquery
  - bioconductor-biobase

  # Bioconductor — raw data processing
  - bioconductor-affy
  - bioconductor-limma

  # CRAN — data manipulation
  - r-dplyr
  - r-tidyr
  - r-stringr
  - r-tibble

  # YAML parsing (SKILL.md validation)
  - r-yaml

  # Development & testing
  - r-testthat
  - r-lintr
